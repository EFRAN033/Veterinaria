# docker-compose.prod.yml
# Producción — Backend + Base de Datos en VPS
# Frontend en Render: https://veterinaria-k6f4.onrender.com
# API expuesta vía Cloudflare Tunnel: https://api-veterinaria.efranjs.com
#
# Uso desde ~/veterinaria_deploy en el VPS:
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build

services:
  db:
    image: postgres:16-bookworm
    container_name: veterinaria-db
    restart: unless-stopped
    env_file:
      - .env.prod
    volumes:
      - veterinaria_pgdata:/var/lib/postgresql/data
    # Sin "ports:" — la DB nunca esta expuesta al exterior
    networks:
      - veterinaria_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  api:
    build:
      context: ./back_veterinaria
      dockerfile: Dockerfile
    container_name: veterinaria-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:8001:8000"   # Puerto 8001 en host — Cloudflare Tunnel apuntará aquí
    env_file:
      - .env.prod
    networks:
      - veterinaria_net
    volumes:
      - veterinaria_uploads:/app/uploads
      - veterinaria_static:/app/static

networks:
  veterinaria_net:
    driver: bridge

volumes:
  veterinaria_pgdata:
  veterinaria_uploads:
  veterinaria_static:
